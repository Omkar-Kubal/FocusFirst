<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed": "#c7c5ce",
              "inverse-surface": "#2e3034",
              "on-primary": "#e2e2e2",
              "on-tertiary-fixed": "#ffffff",
              "on-primary-fixed-variant": "#e2e2e2",
              "surface": "#f9f9fe",
              "on-secondary-fixed-variant": "#3b3b42",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed": "#ffffff",
              "error": "#ba1a1a",
              "tertiary-fixed": "#5e5e5e",
              "secondary-container": "#d5d3dc",
              "on-secondary-container": "#1b1b21",
              "on-tertiary": "#e2e2e2",
              "on-secondary": "#ffffff",
              "secondary": "#5e5e65",
              "surface-variant": "#e2e2e7",
              "on-error": "#ffffff",
              "outline-variant": "#c6c6c6",
              "on-primary-container": "#ffffff",
              "surface-container-highest": "#e2e2e7",
              "on-surface": "#1a1c1f",
              "secondary-fixed-dim": "#acaab3",
              "on-surface-variant": "#474747",
              "on-error-container": "#410002",
              "background": "#f9f9fe",
              "surface-container-low": "#f3f3f8",
              "on-secondary-fixed": "#1b1b21",
              "primary-fixed": "#5e5e5e",
              "error-container": "#ffdad6",
              "surface-bright": "#f9f9fe",
              "on-tertiary-container": "#ffffff",
              "surface-dim": "#d9dade",
              "primary-container": "#3b3b3b",
              "primary-fixed-dim": "#474747",
              "on-tertiary-fixed-variant": "#e2e2e2",
              "outline": "#777777",
              "surface-container": "#ededf2",
              "tertiary-container": "#747474",
              "surface-container-high": "#e8e8ed",
              "tertiary": "#3b3b3b",
              "inverse-on-surface": "#f0f0f5",
              "tertiary-fixed-dim": "#474747",
              "primary": "#000000",
              "surface-tint": "#5e5e5e",
              "on-background": "#1a1c1f",
              "inverse-primary": "#c6c6c6"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl flex items-center justify-between px-6 h-16 border-b border-gray-200/10">
<div class="flex items-center gap-2 active:scale-95 duration-200 transition-opacity hover:opacity-70 cursor-pointer">
<span class="material-symbols-outlined text-black" data-icon="timer">timer</span>
<span class="font-inter font-bold tracking-tight text-xl text-black dark:text-white">FocusFirst</span>
</div>
<div class="flex items-center active:scale-95 duration-200 transition-opacity hover:opacity-70 cursor-pointer">
<span class="material-symbols-outlined text-black" data-icon="settings">settings</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-6 pt-20 pb-32 gap-12">
<!-- Segmented Control / Preset Chips -->
<nav class="flex p-1 bg-surface-container-high rounded-xl w-full max-w-sm">
<button class="flex-1 py-2 text-sm font-semibold text-primary bg-surface-container-lowest rounded-lg shadow-sm transition-all">Focus</button>
<button class="flex-1 py-2 text-sm font-medium text-on-surface-variant hover:text-primary transition-all">Short Break</button>
<button class="flex-1 py-2 text-sm font-medium text-on-surface-variant hover:text-primary transition-all">Long Break</button>
</nav>
<!-- Circular Timer Component -->
<div class="relative flex items-center justify-center w-72 h-72 md:w-80 md:h-80">
<!-- Thin Stroked Ring -->
<svg class="absolute w-full h-full" viewbox="0 0 100 100">
<circle class="text-surface-variant" cx="50" cy="50" fill="transparent" r="45" stroke="currentColor" stroke-width="1.5"></circle>
<circle class="text-primary progress-ring-circle" cx="50" cy="50" fill="transparent" r="45" stroke="currentColor" stroke-dasharray="282.7" stroke-dashoffset="70" stroke-linecap="round" stroke-width="1.5"></circle>
</svg>
<!-- Time Display -->
<div class="text-center">
<span class="block text-7xl md:text-8xl font-thin tracking-tighter text-primary font-headline">25:00</span>
<span class="block text-xs font-label tracking-[0.2em] uppercase text-on-surface-variant mt-2">minutes remaining</span>
</div>
</div>
<!-- Play Button -->
<div class="flex items-center justify-center">
<button class="w-20 h-20 bg-primary rounded-full flex items-center justify-center text-on-primary shadow-xl active:scale-90 duration-200 transition-transform">
<span class="material-symbols-outlined text-4xl" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
<!-- Stats Bento Grid -->
<div class="grid grid-cols-2 gap-4 w-full max-w-sm mt-4">
<!-- Daily Goal Card -->
<div class="bg-surface-container-lowest p-5 rounded-xl flex flex-col gap-3 shadow-[0_4px_20px_rgba(26,28,31,0.04)]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-on-surface-variant" data-icon="track_changes">track_changes</span>
<span class="text-[10px] font-label font-bold uppercase tracking-widest text-on-surface-variant">Daily Goal</span>
</div>
<div>
<span class="text-2xl font-bold text-primary">4/8</span>
<span class="text-xs text-on-surface-variant ml-1">sessions</span>
</div>
<div class="w-full h-1 bg-surface-container-high rounded-full overflow-hidden">
<div class="bg-primary h-full w-1/2 rounded-full"></div>
</div>
</div>
<!-- Streak Card -->
<div class="bg-surface-container-lowest p-5 rounded-xl flex flex-col gap-3 shadow-[0_4px_20px_rgba(26,28,31,0.04)]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-on-surface-variant" data-icon="local_fire_department" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="text-[10px] font-label font-bold uppercase tracking-widest text-on-surface-variant">Streak</span>
</div>
<div>
<span class="text-2xl font-bold text-primary">12</span>
<span class="text-xs text-on-surface-variant ml-1">days</span>
</div>
<div class="text-[10px] text-on-surface-variant font-medium">Top 5% this month</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-3 bg-white/70 backdrop-blur-xl z-50 border-t border-gray-200/10">
<!-- Timer Tab (Active) -->
<a class="flex flex-col items-center justify-center text-black bg-gray-100 rounded-xl px-4 py-1 active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="schedule" style="font-variation-settings: 'FILL' 1;">schedule</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest mt-1">Timer</span>
</a>
<!-- Stats Tab -->
<a class="flex flex-col items-center justify-center text-gray-400 hover:text-black transition-colors active:scale-90 duration-200 px-4 py-1" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest mt-1">Stats</span>
</a>
<!-- Profile Tab -->
<a class="flex flex-col items-center justify-center text-gray-400 hover:text-black transition-colors active:scale-90 duration-200 px-4 py-1" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
</body></html>
