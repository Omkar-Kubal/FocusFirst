<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>FocusFirst - The Focused Void</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#000000",
              "on-secondary": "#1a1b1f",
              "on-primary": "#1a1c1c",
              "tertiary-fixed": "#5d5e63",
              "surface-container-lowest": "#0e0e0e",
              "surface-dim": "#131313",
              "primary-fixed": "#5d5f5f",
              "surface-bright": "#393939",
              "primary-fixed-dim": "#454747",
              "on-primary-fixed": "#ffffff",
              "on-surface": "#e2e2e2",
              "surface-variant": "#353535",
              "surface-container-low": "#1b1b1b",
              "on-primary-fixed-variant": "#e2e2e2",
              "on-tertiary-container": "#000000",
              "tertiary-container": "#8f9095",
              "outline-variant": "#474747",
              "on-error": "#690005",
              "inverse-on-surface": "#303030",
              "on-secondary-fixed": "#1a1b1f",
              "on-error-container": "#ffdad6",
              "secondary-container": "#46464b",
              "outline": "#919191",
              "error-container": "#93000a",
              "surface-container-highest": "#353535",
              "background": "#131313",
              "on-tertiary": "#1a1c1f",
              "on-secondary-fixed-variant": "#3a3b3f",
              "primary-container": "#d4d4d4",
              "on-secondary-container": "#e3e2e7",
              "secondary-fixed-dim": "#ababb0",
              "secondary": "#c6c6cb",
              "error": "#ffb4ab",
              "surface": "#131313",
              "surface-container-high": "#2a2a2a",
              "surface-tint": "#c6c6c7",
              "primary": "#ffffff",
              "on-surface-variant": "#c6c6c6",
              "inverse-surface": "#e2e2e2",
              "surface-container": "#1f1f1f",
              "on-tertiary-fixed": "#ffffff",
              "inverse-primary": "#5d5f5f",
              "on-background": "#e2e2e2",
              "on-tertiary-fixed-variant": "#e2e2e7",
              "tertiary": "#e2e2e7",
              "secondary-fixed": "#c6c6cb",
              "tertiary-fixed-dim": "#45474b"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            -webkit-font-smoothing: antialiased;
        }
        .timer-ring {
            stroke-dasharray: 880;
            stroke-dashoffset: 220; /* 75% complete */
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .tap-highlight-transparent {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body selection:bg-primary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/10 dark:bg-black/10 backdrop-blur-xl border-b border-white/10 flex items-center justify-between px-4 h-14 w-full">
<div class="flex items-center justify-center w-10 h-10 opacity-70 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white" data-icon="settings">settings</span>
</div>
<h1 class="font-['Inter'] font-semibold text-lg tracking-tight text-white">Focus</h1>
<div class="flex items-center justify-center w-10 h-10 opacity-70 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white" data-icon="more_horiz">more_horiz</span>
</div>
</header>
<main class="relative min-h-screen pt-24 pb-32 px-6 flex flex-col items-center">
<!-- Presets Pill Selector -->
<section class="w-full max-w-md mb-16">
<div class="flex items-center gap-2 overflow-x-auto pb-4 no-scrollbar">
<button class="flex-none px-6 py-2 rounded-full bg-primary text-on-primary text-sm font-semibold transition-all">
                    Focus
                </button>
<button class="flex-none px-6 py-2 rounded-full bg-white/10 text-white/60 text-sm font-medium hover:bg-white/15 transition-all">
                    Short Break
                </button>
<button class="flex-none px-6 py-2 rounded-full bg-white/10 text-white/60 text-sm font-medium hover:bg-white/15 transition-all">
                    Long Break
                </button>
</div>
</section>
<!-- Timer Section -->
<section class="flex flex-col items-center justify-center flex-1 w-full">
<div class="relative w-72 h-72 md:w-80 md:h-80 flex items-center justify-center">
<!-- Progress Ring -->
<svg class="absolute inset-0 w-full h-full" viewbox="0 0 300 300">
<circle cx="150" cy="150" fill="transparent" r="140" stroke="rgba(255,255,255,0.05)" stroke-width="4"></circle>
<circle class="timer-ring transition-all duration-1000" cx="150" cy="150" fill="transparent" r="140" stroke="white" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<!-- Timer Text -->
<div class="text-center z-10">
<div class="text-[5rem] md:text-[6rem] font-bold tracking-tighter leading-none mb-1">
                        25:00
                    </div>
<div class="text-[0.75rem] font-medium tracking-[0.2em] uppercase text-white/40">
                        FOCUS
                    </div>
</div>
</div>
<!-- Focus FAB -->
<div class="mt-16">
<button class="w-20 h-20 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-2xl active:scale-90 transition-transform hover:opacity-90">
<span class="material-symbols-outlined text-4xl" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
</section>
<!-- Contextual Stats Card (Bento Style) -->
<section class="w-full max-w-md mt-12 grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-5 rounded-xl border border-white/5">
<div class="text-white/40 text-[10px] uppercase tracking-widest font-bold mb-2">DAILY GOAL</div>
<div class="flex items-end gap-1">
<span class="text-2xl font-bold">4</span>
<span class="text-white/40 text-sm mb-1">/ 8</span>
</div>
</div>
<div class="bg-surface-container-low p-5 rounded-xl border border-white/5">
<div class="text-white/40 text-[10px] uppercase tracking-widest font-bold mb-2">STREAK</div>
<div class="flex items-center gap-2">
<span class="text-2xl font-bold">12</span>
<span class="material-symbols-outlined text-primary text-lg" data-icon="local_fire_department" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 pb-safe bg-white/10 dark:bg-black/10 backdrop-blur-xl border-t border-white/10 flex justify-around items-center h-16 px-6">
<button class="flex flex-col items-center justify-center text-white scale-110 tap-highlight-transparent active:opacity-50 transition-all">
<span class="material-symbols-outlined mb-1" data-icon="timer" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-[0.05em] uppercase">Timer</span>
</button>
<button class="flex flex-col items-center justify-center text-white/40 hover:text-white/80 tap-highlight-transparent active:opacity-50 transition-all">
<span class="material-symbols-outlined mb-1" data-icon="bar_chart">bar_chart</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-[0.05em] uppercase">Stats</span>
</button>
<button class="flex flex-col items-center justify-center text-white/40 hover:text-white/80 tap-highlight-transparent active:opacity-50 transition-all">
<span class="material-symbols-outlined mb-1" data-icon="person_outline">person_outline</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-[0.05em] uppercase">Profile</span>
</button>
</nav>
<!-- Background Decoration for Depth -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-white/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-white/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
